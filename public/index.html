<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakTiers · Pakistan MC PvP Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --border:   #1e2530;
    --accent:   #7FFF00;
    --accent2:  #00c864;
    --dim:      #3a4250;
    --text:     #d0dce8;
    --muted:    #6a7a8a;
    --HT1: #FF6B00; --LT1: #FF9933;
    --HT2: #FFB800; --LT2: #FFD700;
    --HT3: #00C864; --LT3: #00A550;
    --HT4: #4FC3F7; --LT4: #29B6F6;
    --HT5: #888888; --LT5: #555555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(127,255,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: 0;
    background: rgba(10,12,15,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1100px; margin: 0 auto; padding: 0 20px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(127,255,0,.4);
  }

  .logo span { color: var(--text); }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 4px;
  }

  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    transition: background .3s;
  }
  .live-dot.connected { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    padding: 20px 0 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; letter-spacing: 1px;
    padding: 10px 20px;
    background: none;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--text); border-color: var(--border); }

  .tab.active {
    color: var(--accent);
    border-color: var(--border);
    background: var(--surface);
    border-bottom-color: var(--surface);
    margin-bottom: -1px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 20px 0;
    align-items: center;
  }

  .filter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-right: 4px;
  }

  .weapon-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all .15s;
    text-transform: uppercase;
  }

  .weapon-btn:hover { border-color: var(--dim); color: var(--text); }
  .weapon-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(127,255,0,.06); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 4px;
    transition: border-color .2s;
  }

  .stat-card.flash { border-color: var(--accent); }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-top: 6px;
  }

  /* ── LEADERBOARD ── */
  .lb-table { width: 100%; border-collapse: collapse; }

  .lb-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .lb-row {
    border-bottom: 1px solid rgba(30,37,48,.6);
    transition: background .15s;
    animation: rowIn .3s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lb-row:hover { background: rgba(127,255,0,.03); cursor: pointer; }
  .lb-row.highlight { animation: highlightRow .8s ease; }

  @keyframes highlightRow {
    0%   { background: rgba(127,255,0,.15); }
    100% { background: transparent; }
  }

  .lb-cell { padding: 12px; vertical-align: middle; }

  .rank-num {
    font-family: 'Orbitron', sans-serif;
    font-size: .85rem; font-weight: 700;
    color: var(--muted); width: 48px;
  }

  .rank-num.gold   { color: #FFD700; }
  .rank-num.silver { color: #C0C0C0; }
  .rank-num.bronze { color: #CD7F32; }

  .player-cell { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 3px;
    border: 1px solid var(--border);
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  .ign { font-size: 1rem; font-weight: 700; letter-spacing: .5px; }

  .rank-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; color: var(--muted);
    margin-top: 2px;
  }

  .tiers-cell { display: flex; flex-wrap: wrap; gap: 5px; }

  .tier-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; padding: 3px 8px;
    border-radius: 2px; font-weight: 700;
    border: 1px solid currentColor;
    opacity: .9;
    white-space: nowrap;
  }

  .pts-cell {
    font-family: 'Orbitron', sans-serif;
    font-size: .9rem; font-weight: 700;
    color: var(--accent);
    text-align: right;
  }

  /* ── PROFILE ── */
  #profilePane { display: none; }

  .search-bar { display: flex; gap: 10px; padding: 20px 0; }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .9rem;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s;
  }

  .search-input:focus { border-color: var(--accent); }

  .search-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: .75rem; font-weight: 700;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .15s;
  }

  .search-btn:hover { opacity: .85; }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px;
    display: none;
  }

  .profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }

  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 4px; border: 2px solid var(--border);
    image-rendering: pixelated;
  }

  .profile-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem; font-weight: 900;
    color: var(--accent);
  }

  .profile-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; color: var(--muted);
    margin-top: 6px;
  }

  .profile-tiers {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .profile-tier-card {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    border-left-width: 3px;
  }

  .profile-tier-weapon {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .profile-tier-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    margin-top: 6px;
  }

  /* ── QUEUE ── */
  #queuePane { display: none; }

  .queue-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    padding-top: 20px;
  }

  .queue-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    transition: border-color .3s;
  }

  .queue-card.active-queue { border-color: var(--accent2); }

  .queue-weapon {
    font-family: 'Orbitron', sans-serif;
    font-size: .8rem; font-weight: 700;
    letter-spacing: 1px; margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .queue-player {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: .9rem;
    animation: rowIn .3s ease both;
  }

  .queue-avatar {
    width: 24px; height: 24px;
    border-radius: 2px; image-rendering: pixelated;
    border: 1px solid var(--border);
  }

  .queue-empty {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--dim);
    text-align: center; padding: 12px 0;
  }

  .queue-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; color: var(--muted);
    float: right;
  }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; color: var(--dim);
  }

  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; opacity: .3; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    padding: 12px 20px;
    border-radius: 4px;
    z-index: 999;
    animation: toastIn .3s ease;
    box-shadow: 0 0 20px rgba(127,255,0,.2);
  }

  @keyframes toastIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 3px;
    height: 16px;
  }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .lb-header:nth-child(4), .lb-cell:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">PAK<span>TIERS</span></div>
    <div class="live-badge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveStatus">Connecting...</span>
    </div>
  </div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('leaderboard', this)">Leaderboard</button>
    <button class="tab" onclick="showTab('profile', this)">Player Lookup</button>
    <button class="tab" onclick="showTab('queue', this)">Live Queue</button>
  </div>

  <!-- ─── LEADERBOARD ─── -->
  <div id="leaderboardPane">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Total Players</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Tiered</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">In Queue</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Matches Played</div></div>
    </div>

    <div class="filters">
      <span class="filter-label">Weapon:</span>
      <button class="weapon-btn active" onclick="filterWeapon('all', this)">All</button>
      <button class="weapon-btn" onclick="filterWeapon('Mace', this)">🔨 Mace</button>
      <button class="weapon-btn" onclick="filterWeapon('Crystal', this)">💠 Crystal</button>
      <button class="weapon-btn" onclick="filterWeapon('Sword', this)">⚔️ Sword</button>
      <button class="weapon-btn" onclick="filterWeapon('Axe', this)">🪓 Axe</button>
      <button class="weapon-btn" onclick="filterWeapon('Netherite', this)">🪨 Netherite</button>
    </div>

    <div id="lbContainer">
      <table class="lb-table">
        <thead>
          <tr>
            <th class="lb-header">#</th>
            <th class="lb-header">Player</th>
            <th class="lb-header">Tiers</th>
            <th class="lb-header" style="text-align:right">Points</th>
          </tr>
        </thead>
        <tbody id="lbBody">
          <tr><td colspan="4" class="lb-cell"><div class="skeleton" style="width:100%;height:40px"></div></td></tr>
          <tr><td colspan="4" class="lb-cell"><div class="skeleton" style="width:100%;height:40px;opacity:.7"></div></td></tr>
          <tr><td colspan="4" class="lb-cell"><div class="skeleton" style="width:100%;height:40px;opacity:.4"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ─── PROFILE ─── -->
  <div id="profilePane">
    <div class="search-bar">
      <input class="search-input" id="ignInput" type="text" placeholder="Enter Minecraft IGN..."
             maxlength="16" onkeydown="if(event.key==='Enter') lookupPlayer()">
      <button class="search-btn" onclick="lookupPlayer()">LOOKUP</button>
    </div>
    <div class="profile-card" id="profileCard"></div>
    <div class="empty-state" id="profileEmpty">
      <div class="big">🔎</div>
      Enter a Minecraft IGN to view their PakTiers profile
    </div>
  </div>

  <!-- ─── QUEUE ─── -->
  <div id="queuePane">
    <div class="queue-grid" id="queueGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="big">⚔️</div>Loading queue...</div>
    </div>
  </div>

</div>

<div id="toastContainer"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
//  Railway deploy ke baad apna URL yahan daalo:
//  const API = 'https://paktiers-api.up.railway.app';
//  const WS  = 'wss://paktiers-api.up.railway.app';
// ─────────────────────────────────────────────────────────────
const API = window.location.origin;
const WS  = window.location.origin.replace(/^http/, 'ws');

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let currentWeapon = 'all';
let ws = null;
let reconnectTimer = null;
let stats = { totalPlayers:0, tieredPlayers:0, queuedNow:0, totalMatches:0 };

const TIER_COLOR = {
  HT1:'#FF6B00', LT1:'#FF9933', HT2:'#FFB800', LT2:'#FFD700',
  HT3:'#00C864', LT3:'#00A550', HT4:'#4FC3F7', LT4:'#29B6F6',
  HT5:'#888888', LT5:'#555555',
};

// ─────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('leaderboardPane').style.display = name === 'leaderboard' ? '' : 'none';
  document.getElementById('profilePane').style.display     = name === 'profile'     ? '' : 'none';
  document.getElementById('queuePane').style.display       = name === 'queue'       ? '' : 'none';
  if (name === 'queue') fetchQueue();
}

// ─────────────────────────────────────────────────────────────
//  FETCH HELPERS
// ─────────────────────────────────────────────────────────────
async function apiFetch(endpoint) {
  const r = await fetch(API + endpoint);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

// ─────────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────────
async function fetchStats() {
  try {
    const d = await apiFetch('/api/stats');
    stats = d;
    renderStats(d);
  } catch (_) {}
}

function renderStats(d) {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${d.totalPlayers}</div><div class="stat-label">Total Players</div></div>
    <div class="stat-card"><div class="stat-num">${d.tieredPlayers}</div><div class="stat-label">Tiered</div></div>
    <div class="stat-card"><div class="stat-num">${d.queuedNow}</div><div class="stat-label">In Queue</div></div>
    <div class="stat-card"><div class="stat-num">${d.totalMatches}</div><div class="stat-label">Matches Played</div></div>
  `;
}

function flashStat(index) {
  const cards = document.querySelectorAll('.stat-card');
  if (cards[index]) {
    cards[index].classList.add('flash');
    setTimeout(() => cards[index].classList.remove('flash'), 800);
  }
}

// ─────────────────────────────────────────────────────────────
//  LEADERBOARD
// ─────────────────────────────────────────────────────────────
async function fetchLeaderboard(weapon = 'all') {
  try {
    const d = await apiFetch(`/api/leaderboard?weapon=${weapon}`);
    renderLeaderboard(d.players);
  } catch (_) {
    document.getElementById('lbBody').innerHTML =
      `<tr><td colspan="4" class="lb-cell">
        <div class="empty-state">
          <div class="big">⚠️</div>
          API server se connect nahi ho pa raha.<br>
          <span style="font-size:.7rem;margin-top:8px;display:block">Make sure api_server.js Railway pe chal raha hai.</span>
        </div>
      </td></tr>`;
  }
}

function renderLeaderboard(players, highlightIgn = null) {
  const tbody = document.getElementById('lbBody');
  if (!players || !players.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="lb-cell"><div class="empty-state"><div class="big">🏆</div>No ranked players yet</div></td></tr>`;
    return;
  }

  tbody.innerHTML = players.map((p, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const medal     = i === 0 ? '🥇'  : i === 1 ? '🥈'     : i === 2 ? '🥉'     : `${i+1}`;
    const tierBadges = Object.entries(p.tiers || {}).map(([w, t]) =>
      `<span class="tier-badge" style="color:${TIER_COLOR[t]||'#888'}">${w[0]} ${t}</span>`
    ).join('');
    const highlight = highlightIgn && p.ign === highlightIgn ? ' highlight' : '';

    return `
      <tr class="lb-row${highlight}" onclick="quickProfile('${p.ign}')" style="animation-delay:${i*40}ms">
        <td class="lb-cell"><div class="rank-num ${rankClass}">${medal}</div></td>
        <td class="lb-cell">
          <div class="player-cell">
            <img class="avatar" src="${p.avatar}" alt="${p.ign}" onerror="this.src='https://mc-heads.net/avatar/steve/36'">
            <div>
              <div class="ign">${p.ign}</div>
              <div class="rank-title">${p.rankTitle.emoji} ${p.rankTitle.label}</div>
            </div>
          </div>
        </td>
        <td class="lb-cell"><div class="tiers-cell">${tierBadges || '<span style="color:var(--dim);font-size:.8rem">—</span>'}</div></td>
        <td class="lb-cell"><div class="pts-cell">${p.totalPts}</div></td>
      </tr>`;
  }).join('');
}

function filterWeapon(weapon, el) {
  currentWeapon = weapon;
  document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  fetchLeaderboard(weapon);
}

// ─────────────────────────────────────────────────────────────
//  PROFILE
// ─────────────────────────────────────────────────────────────
async function lookupPlayer() {
  const ign   = document.getElementById('ignInput').value.trim();
  if (!ign) return;
  const card  = document.getElementById('profileCard');
  const empty = document.getElementById('profileEmpty');
  card.style.display  = 'none';
  empty.style.display = '';
  empty.innerHTML = '<div class="big" style="animation:pulse 1s infinite">⏳</div>Loading...';

  try {
    const p = await apiFetch(`/api/player/${encodeURIComponent(ign)}`);
    renderProfile(p);
  } catch (_) {
    empty.innerHTML = `<div class="big">❌</div>Player "<b>${ign}</b>" not found or not registered.`;
  }
}

function renderProfile(p) {
  const card  = document.getElementById('profileCard');
  const empty = document.getElementById('profileEmpty');
  empty.style.display = 'none';

  const tierCards = Object.entries(p.tiers || {}).map(([w, t]) => `
    <div class="profile-tier-card" style="border-left-color:${TIER_COLOR[t]||'#888'}">
      <div class="profile-tier-weapon">${w}</div>
      <div class="profile-tier-value" style="color:${TIER_COLOR[t]||'#888'}">${t}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="profile-top">
      <img class="profile-avatar" src="${p.avatar}" alt="${p.ign}" onerror="this.src='https://mc-heads.net/avatar/steve/80'">
      <div>
        <div class="profile-name">${p.ign}</div>
        <div class="profile-rank">${p.rankTitle.emoji} ${p.rankTitle.label} · ${p.totalPts} pts</div>
      </div>
    </div>
    <div class="profile-tiers">
      ${tierCards || '<div style="color:var(--muted);font-family:\'Share Tech Mono\',monospace;font-size:.8rem">No tiers assigned yet.</div>'}
    </div>
  `;
  card.style.display = 'block';
}

function quickProfile(ign) {
  document.getElementById('ignInput').value = ign;
  showTab('profile', document.querySelectorAll('.tab')[1]);
  lookupPlayer();
}

// ─────────────────────────────────────────────────────────────
//  QUEUE
// ─────────────────────────────────────────────────────────────
async function fetchQueue() {
  try {
    const d = await apiFetch('/api/queue');
    renderQueue(d.queues);
  } catch (_) {}
}

function renderQueue(queues) {
  const grid    = document.getElementById('queueGrid');
  const weapons = ['Mace','Crystal','Sword','Axe','Netherite'];
  const icons   = { Mace:'🔨', Crystal:'💠', Sword:'⚔️', Axe:'🪓', Netherite:'🪨' };

  grid.innerHTML = weapons.map(w => {
    const players   = queues[w] || [];
    const hasPlayer = players.length > 0;
    const playerHTML = hasPlayer
      ? players.map(p => `
          <div class="queue-player">
            <img class="queue-avatar" src="https://mc-heads.net/avatar/${p.ign}/24" onerror="this.style.display='none'">
            <span>${p.ign}</span>
          </div>`).join('')
      : `<div class="queue-empty">Empty</div>`;

    return `
      <div class="queue-card${hasPlayer ? ' active-queue' : ''}">
        <div class="queue-weapon">${icons[w]} ${w} <span class="queue-count">${players.length}/2</span></div>
        ${playerHTML}
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────
//  WEBSOCKET — Real-time updates
// ─────────────────────────────────────────────────────────────
function connectWS() {
  const dot    = document.getElementById('liveDot');
  const status = document.getElementById('liveStatus');

  try {
    ws = new WebSocket(WS);

    ws.onopen = () => {
      dot.classList.add('connected');
      status.textContent = 'Live';
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);

        if (msg.type === 'init') {
          // Server se full state mili — sab refresh karo
          fetchStats();
          fetchLeaderboard(currentWeapon);
          return;
        }

        if (msg.type === 'tier_updated') {
          fetchLeaderboard(currentWeapon).then(() => {
            // Updated player ko highlight karo
          });
          fetchStats();
          flashStat(1);
          showToast(`🔄 ${msg.ign} — ${msg.weapon} tier updated to ${msg.tier}`);
        }

        if (msg.type === 'tier_removed') {
          fetchLeaderboard(currentWeapon);
          fetchStats();
          showToast(`🗑️ ${msg.ign} — ${msg.weapon} tier removed`);
        }

        if (msg.type === 'player_registered') {
          fetchStats();
          flashStat(0);
          showToast(`✅ ${msg.player.ign} registered!`);
        }

        if (msg.type === 'queue_updated') {
          if (document.getElementById('queuePane').style.display !== 'none') {
            fetchQueue();
          }
          fetchStats();
          flashStat(2);
        }

        if (msg.type === 'match_created') {
          fetchStats();
          flashStat(3);
          const { match } = msg;
          showToast(`🏆 Match! ${match.players[0].ign} vs ${match.players[1].ign} — ${match.weapon}`);
        }
      } catch (_) {}
    };

    ws.onclose = () => {
      dot.classList.remove('connected');
      status.textContent = 'Reconnecting...';
      reconnectTimer = setTimeout(connectWS, 4000);
    };

    ws.onerror = () => {
      dot.classList.remove('connected');
      status.textContent = 'Offline';
    };
  } catch (_) {}
}

// ─────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
fetchStats();
fetchLeaderboard();
connectWS();

// Fallback 30s refresh agar WS disconnect ho
setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    fetchLeaderboard(currentWeapon);
    fetchStats();
  }
}, 30000);
</script>
